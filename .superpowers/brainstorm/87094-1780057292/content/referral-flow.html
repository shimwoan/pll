<h2>지인 소개 케이스 — 어떻게 들어옵니까?</h2>
<p class="subtitle">FM이 소개 케이스를 처음 접하는 방식을 골라주세요</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>전화는 오는데 source가 다름</h3>
      <p>전화를 받긴 하는데 "친구한테 들었어요" — 지금도 Calls에서 시작하지만 Referral 처리가 없음</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>직접 방문 / 문자 / SNS로 연락</h3>
      <p>전화 없이 바로 찾아오거나 문자로 옴 — Calls 화면 자체를 거치지 않음</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>둘 다 있음</h3>
      <p>전화로 오는 경우도, 직접 오는 경우도 섞여 있음</p>
    </div>
  </div>
</div>
