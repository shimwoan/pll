<h2>핀 고정 카드에서 어떤 액션이 필요한가요?</h2>
<p class="subtitle">이메일 본문 카드에 포함할 버튼을 선택해주세요 (복수 선택 가능)</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="confirm" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content">
      <h3>Confirm Classification</h3>
      <p>AI 분류를 확정하는 버튼 — 현재 리스트에도 있는 기능</p>
    </div>
  </div>

  <div class="option" data-choice="detail" onclick="toggleSelect(this)">
    <div class="letter">→</div>
    <div class="content">
      <h3>View Detail</h3>
      <p>이메일 상세 페이지(/emails/:id)로 이동</p>
    </div>
  </div>

  <div class="option" data-choice="dismiss" onclick="toggleSelect(this)">
    <div class="letter">✕</div>
    <div class="content">
      <h3>닫기 (Dismiss)</h3>
      <p>핀 카드를 닫고 리스트로 복귀</p>
    </div>
  </div>
</div>
